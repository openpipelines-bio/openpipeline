name: filter_with_quantile
namespace: "filter"
scope: "public"
description: |
  Filter observations or features from an .h5mu file based on quantile thresholds of numeric values.
  
  This component removes observations or features that fall outside specified quantile ranges for one or more columns in .obs or .var.
  
  For example, you can filter out observations with total UMI counts in the bottom 5% (quantile < 0.05) or 
  top 5% (quantile > 0.95), or retain an intermediate range (0.1 < quantile < 0.9).

authors:
  - __merge__: /src/authors/dorien_roosen.yaml
    roles: [ author ]

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        type: file
        description: Input h5mu file
        direction: input
        required: true
        example: input.h5mu
      - name: "--modality"
        description: |
          Which modality from the input MuData file to process.
        type: string
        default: "rna"
        required: false
      - name: "--obs_column"
        type: string
        description: |
          Name of the column in .obs to use for quantile-based filtering of observations (cells).
          If not specified, no observation filtering will be performed.
        example: "total_counts"
        required: false
      - name: "--var_column"
        type: string
        description: |
          Name of the column in .var to use for quantile-based filtering of variables (genes/features).
          If not specified, no variable filtering will be performed.
        example: "mean_counts"
        required: false

  - name: Filters
    arguments:
      - name: "--do_subset"
        type: boolean_true
        description: Whether to subset before storing the output.
      - name: "--obs_min_quantile"
        type: double
        description: |
          Minimum quantile threshold for observation filtering. Cells with values below this quantile will be removed.
          Value should be between 0.0 and 1.0.
        min: 0
        max: 1
        example: 0.05
        required: false
      - name: "--obs_max_quantile"
        type: double
        description: |
          Maximum quantile threshold for observation filtering. Cells with values above this quantile will be removed.
          Value should be between 0.0 and 1.0.
        min: 0
        max: 1
        example: 0.95
        required: false
      - name: "--var_min_quantile"
        type: double
        description: |
          Minimum quantile threshold for variable filtering. Genes with values below this quantile will be removed.
          Value should be between 0.0 and 1.0.
        min: 0
        max: 1
        example: 0.01
        required: false
      - name: "--var_max_quantile"
        type: double
        description: |
          Maximum quantile threshold for variable filtering. Genes with values above this quantile will be removed.
          Value should be between 0.0 and 1.0.
        min: 0
        max: 1
        example: 0.99
        required: false
  
  - name: Outputs
    arguments:
      - name: "--output"
        type: file
        description: Output h5mu file.
        direction: output
        example: output.h5mu
      - name: "--obs_name_filter"
        type: string
        default: "filter_with_quantile"
        description: In which .obs slot to store a boolean array corresponding to which observations should be removed.
      - name: "--var_name_filter"
        type: string
        default: "filter_with_quantile"
        description: In which .var slot to store a boolean array corresponding to which variables should be removed.
    __merge__: [., /src/base/h5_compression_argument.yaml]

resources:
  - type: python_script
    path: script.py
  - path: /src/utils/setup_logger.py
  - path: /src/utils/compress_h5mu.py
test_resources:
  - type: python_script
    path: test.py
  - path: /resources_test/pbmc_1k_protein_v3/pbmc_1k_protein_v3_filtered_feature_bc_matrix.h5mu

engines:
- type: docker
  image: python:3.13-slim
  setup:
    - type: apt
      packages: 
        - procps
    - type: python
      __merge__: /src/base/requirements/anndata_mudata.yaml
  __merge__: [ /src/base/requirements/python_test_setup.yaml, .]

runners:
- type: executable
- type: nextflow
  directives:
    label: [singlecpu, lowmem]