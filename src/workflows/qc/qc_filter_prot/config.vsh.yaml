name: "qc_filter_prot"
namespace: "workflows/qc"
scope: "public"
description: |
  Compute QC keep-flags for a single-sample, unimodal protein h5mu, reproducing the
  quantile-based ("quant") protein filtering of the reference QC script. All filters run in
  flag-only mode (no subsetting): boolean keep-columns (True = keep) are written to .obs so
  that a downstream component can report per-stage cell counts and subset once.
authors:
  - __merge__: /src/authors/dorien_roosen.yaml
    roles: [ author ]
argument_groups:
  - name: "Input"
    arguments:
      - name: "--id"
        required: true
        type: string
        description: ID of the sample.
        example: foo
      - name: "--input"
        type: file
        required: true
        description: Path to the unimodal protein sample.
        example: dataset.h5mu
      - name: "--layer"
        type: string
        required: false
        description: "Input layer to start from. By default, .X will be used."
  - name: "Output"
    arguments:
      - name: "--output"
        type: file
        required: true
        direction: output
        description: The input data with QC keep-flags added to .obs.
        example: output.h5mu
  - name: "Filtering options"
    arguments:
      - name: "--min_count"
        type: integer
        example: 500
        description: |
          Minimum number of total counts per cell. Cells below this are flagged for removal.
      - name: "--max_quantile"
        type: double
        min: 0
        max: 1
        example: 0.95
        description: |
          Maximum quantile of the log1p-transformed total counts. Cells above this quantile
          are flagged for removal.
resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - type: file
    path: /src/workflows/utils/
dependencies:
  - name: qc/calculate_qc_metrics
  - name: filter/filter_with_counts
  - name: filter/filter_with_quantile
runners:
  - type: nextflow
