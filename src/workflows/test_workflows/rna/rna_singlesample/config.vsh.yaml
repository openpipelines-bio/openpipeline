functionality:
  name: "rna_singlesample_test"
  namespace: "test_workflows/rna"
  description: "This component test the output of the integration test of the rna singlesample workflow."
  authors:
    - __merge__: /src/authors/jakub_majercik.yaml
  argument_groups:
    - name: Inputs
      arguments:
        - name: "--input"
          type: file
          required: true
          description: Path to h5mu output.
          example: foo.final.h5mu
        - name: "--input_og"
          type: file
          required: true
          description: Path to the original h5mu file.
          example: foo.h5mu
    - name: Input arguments
      arguments:
        - name: "--input_id"
          type: string
          required: true
          description: The input id.
          example: "foo"
  resources:
    - type: python_script
      path: script.py
    - path: /src/utils/setup_logger.py
    - path: /src/base/openpipelinetestutils
      dest: openpipelinetestutils
platforms:
  - type: docker
    image: python:3.12-slim
    setup:
      - type: docker
        copy: ["openpipelinetestutils /opt/openpipelinetestutils"]
      - type: apt
        packages: 
          - procps
      - type: python
        packages: /opt/openpipelinetestutils
      - type: python
        pypi:
          - mudata
          # - pytest
        __merge__: /src/base/requirements/viashpy.yaml
  - type: nextflow