name: "cellranger_multi_test"
namespace: "test_workflows/ingestion"
scope: "test"
description: "This component test the output of the integration test of the cellranger multi workflow."
authors:
  - __merge__: /src/authors/jakub_majercik.yaml
argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        type: file
        required: true
        multiple: true
        description: Path to h5mu output.
        example: foo.final.h5mu
      - name: "--input_filtered"
        type: file
        required: false
        multiple: true
        description: |
          Path to h5mu output generated with --output_filtered_data enabled.
          When provided, the per-sample filtered count matrices are checked to
          contain fewer cells than the corresponding raw count matrices.
        example: foo.filtered.h5mu
resources:
  - type: python_script
    path: script.py
  - path: /src/utils/setup_logger.py
engines:
  - type: docker
    image: python:3.12-slim
    __merge__: /src/base/requirements/testworkflows_setup.yaml
runners:
  - type: executable
  - type: nextflow