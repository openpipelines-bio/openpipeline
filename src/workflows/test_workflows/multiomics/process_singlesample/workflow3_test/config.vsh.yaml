name: "workflow3_test"
namespace: "test_workflows/multiomics/process_singlesample"
scope: "test"
description: "This component tests the output of the integration test of process_singlesample test_wf3, which verifies that cells classified as doublets (scrublet score above --scrublet_score_threshold) are removed from the output."
authors:
  - __merge__: /src/authors/dorien_roosen.yaml
argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        type: file
        required: true
        description: Path to the processed h5mu file.
        example: test.h5mu
      - name: "--orig_input"
        type: file
        required: true
        description: Path to the original input file.
        example: input.h5mu
      - name: "--scrublet_score_threshold"
        type: double
        required: true
        description: The manual scrublet score threshold that was applied.
        example: 0.1
resources:
  - type: python_script
    path: script.py
engines:
  - type: docker
    image: python:3.13-slim
    __merge__: /src/base/requirements/testworkflows_setup.yaml
runners:
  - type: executable
  - type: nextflow
    directives:
      label: ["midmem"]
