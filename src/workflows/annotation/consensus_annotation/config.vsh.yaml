name: "consensus_annotation"
namespace: "workflows/annotation"
scope: "public"
description: |
  Runs scANVI-scArches, CellTypist, and SingleR cell type annotation in parallel,
  merges the resulting slots back onto the original input file, and produces a
  consensus prediction via weighted majority vote.
authors:
  - __merge__: /src/authors/dorien_roosen.yaml
    roles: [ author ]

argument_groups:
  - name: "Input"
    arguments:
      - name: "--id"
        required: true
        type: string
        description: ID of the sample.
        example: foo
      - name: "--input"
        alternatives: ["-i"]
        required: true
        type: file
        description: Query dataset to annotate. Expected to be pre-processed.
        example: input.h5mu
      - name: "--modality"
        type: string
        default: "rna"
        required: false
        description: Which modality to process. Must be the same across all three methods.
      - name: "--skip_scanvi"
        type: boolean_true
        description: Skip the scANVI-scArches annotation step.
      - name: "--skip_celltypist"
        type: boolean_true
        description: Skip the CellTypist annotation step.
      - name: "--skip_singler"
        type: boolean_true
        description: Skip the SingleR annotation step.

  - name: "scANVI-scArches"
    description: Arguments for the scANVI-scArches annotation workflow.
    arguments:
      - name: "--scanvi_reference"
        type: file
        required: true
        description: |
          Labeled reference dataset to train scVI/scANVI on. Expected to be
          pre-processed in the same way as --input.
        example: reference.h5mu
      - name: "--scanvi_reference_obs_target"
        type: string
        required: true
        description: ".obs key in --scanvi_reference containing the cell type labels."
        example: cell_type
      - name: "--scanvi_reference_obs_batch_label"
        type: string
        required: true
        description: ".obs key in --scanvi_reference containing the batch labels."
        example: sample
      - name: "--scanvi_input_obs_batch_label"
        type: string
        required: true
        description: ".obs key in --input containing the batch labels."
        example: sample
      - name: "--scanvi_reference_var_hvg"
        type: string
        required: false
        description: ".var column of highly variable genes in --scanvi_reference. If not provided, genes are not subset."
      - name: "--scanvi_layer"
        type: string
        required: false
        description: "Layer in --input containing raw counts. Uses .X when not set."
      - name: "--scanvi_output_obs_predictions"
        type: string
        default: "scanvi_pred"
        description: ".obs slot to store scANVI cell type predictions."
      - name: "--scanvi_output_obs_probability"
        type: string
        default: "scanvi_probabilities"
        description: ".obs slot to store scANVI prediction probabilities."
      - name: "--scanvi_output_obsm_integrated"
        type: string
        default: "X_integrated_scanvi"
        description: ".obsm slot to store the scANVI integrated embedding."

  - name: "CellTypist"
    description: Arguments for the CellTypist annotation workflow.
    arguments:
      - name: "--celltypist_reference"
        type: file
        required: false
        description: |
          Reference dataset to train CellTypist on. Required when --celltypist_model
          is not provided.
        example: reference.h5mu
      - name: "--celltypist_reference_obs_target"
        type: string
        required: false
        default: "cell_ontology_class"
        description: ".obs key in --celltypist_reference containing cell type labels."
      - name: "--celltypist_model"
        type: file
        required: false
        description: |
          Pre-trained CellTypist model in pkl format. Takes precedence over
          --celltypist_reference when provided.
        example: model.pkl
      - name: "--celltypist_layer"
        type: string
        required: false
        description: "Layer in --input containing raw counts. Uses .X when not set."
      - name: "--celltypist_majority_voting"
        type: boolean
        default: false
        description: "Whether to refine predictions via majority voting after over-clustering."
      - name: "--celltypist_output_obs_predictions"
        type: string
        default: "celltypist_pred"
        description: ".obs slot to store CellTypist cell type predictions."
      - name: "--celltypist_output_obs_probability"
        type: string
        default: "celltypist_probability"
        description: ".obs slot to store CellTypist prediction probabilities."

  - name: "SingleR"
    description: Arguments for the SingleR annotation component.
    arguments:
      - name: "--singler_reference"
        type: file
        required: true
        description: Reference dataset for SingleR. Expected to contain log-normalized counts.
        example: reference.h5mu
      - name: "--singler_reference_obs_target"
        type: string
        required: true
        description: ".obs key in --singler_reference containing cell type labels."
        example: cell_type
      - name: "--singler_layer"
        type: string
        required: false
        description: "Layer in --input containing log-normalized counts. Uses .X when not set."
      - name: "--singler_output_obs_predictions"
        type: string
        default: "singler_pred"
        description: ".obs slot to store SingleR cell type predictions."
      - name: "--singler_output_obs_probability"
        type: string
        default: "singler_probability"
        description: ".obs slot to store SingleR prediction probabilities."
      - name: "--singler_output_obs_delta_next"
        type: string
        default: "singler_delta_next"
        description: ".obs slot to store the SingleR delta between best and second-best score."
      - name: "--singler_output_obs_pruned_predictions"
        type: string
        default: "singler_pruned_labels"
        description: ".obs slot to store SingleR pruned labels (low-quality replaced with NA)."
      - name: "--singler_output_obsm_scores"
        type: string
        default: "singler_scores"
        description: ".obsm slot to store the SingleR per-label score matrix."

  - name: "Consensus vote"
    description: Arguments for the consensus vote step.
    arguments:
      - name: "--consensus_weights"
        type: double
        required: false
        multiple: true
        description: |
          Per-method weights for the consensus vote, in the order
          [scanvi, celltypist, singler]. Normalized to sum to 1.
          When not provided, all methods are weighted equally.
        example: [1.0, 1.0, 1.0]
      - name: "--consensus_tie_label"
        type: string
        required: false
        description: |
          Label assigned when two or more cell types receive equal votes.
          When not provided, tied cells receive a missing value.
        example: "Unknown"

  - name: "Output"
    arguments:
      - name: "--output"
        alternatives: ["-o"]
        type: file
        required: true
        direction: output
        description: |
          Output .h5mu file. Contains the original input data enriched with all
          annotation slots from all three methods and the consensus prediction.
        example: output.h5mu
      - name: "--output_obs_predictions"
        type: string
        default: "consensus_pred"
        description: ".obs slot to store the consensus cell type prediction."
      - name: "--output_obs_score"
        type: string
        default: "consensus_score"
        description: ".obs slot to store the consensus score (fraction of vote won by the winner)."
    __merge__: [., /src/base/h5_compression_argument.yaml]

dependencies:
  - name: workflows/annotation/scanvi_scarches
    alias: scanvi_scarches_workflow
  - name: workflows/annotation/celltypist
    alias: celltypist_workflow
  - name: annotate/singler
  - name: dataflow/copy_h5mu_slots
  - name: annotate/consensus_vote

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

runners:
  - type: nextflow
